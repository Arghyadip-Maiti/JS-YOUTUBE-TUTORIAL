<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom( )</title>
</head>
<body>
    
</body>
<script>

    const h1 = document.createElement('h1');
    console.log(h1);//<h1></h1>

    const div = document.createElement('div');
    console.log(div);//<div></div>

    div.className = 'main';
    div.id = 'myId';

    console.log(div);//<div class='main' id='myId'></div>

    div.setAttribute('title','generated title');

    console.log(div);//<div class='main' id='myId' title='generated title'></div>

    div.style.backgroundColor = 'red'
    div.style.height = '150px'
    div.style.width = '150px'//doesn't showing in the web page... we need to attach this...then it will be shown in the web page...

    div.innerText = 'DIV-1'//it will check the inner-text of the div and over-write it...take 2 rounds...(ex:- div.className, div.id)
    
    const addText = document.createTextNode('any text');//it just set the text...takes only one round...(ex:- div.setAttribute())
    div.appendChild(addText);

    document.body.appendChild(div);//add all the changes made in the script to the body...//all the changes will be shown on the page...

</script>
</html>
