<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body style="background-color: #212121; color: aliceblue;">
    <ul class="lang">
        <li>Javascript</li>
    </ul>
    
</body>
<script>
    //adding list-item with function...
    function addLi(langName){
        const ul = document.querySelector('.lang');

        const newLi = document.createElement('li');
        newLi.innerHTML = `${langName}`;

        ul.appendChild(newLi);

    }

    addLi('Python');
    addLi('Java');

    // same function in an optimizes way...

    function addOptiLi(langName){

        const ul = document.querySelector('.lang')

        const newLi = document.createElement('li');
        //---
        const liTxt = document.createTextNode(langName)
        newLi.appendChild(liTxt);
        //---
        ul.appendChild(newLi)
    }
    addOptiLi('golang');

    
    // Value - Edit

    const secondLang = document.querySelector("li:nth-child(2)");
    //secondLang.innerHTML = 'Mojo';
    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secondLang.replaceWith(newli)

    //edit
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>TypeScript</li>'  //difference b/w innerHTML & outerHTML...

    //remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()

</script>
</html>
