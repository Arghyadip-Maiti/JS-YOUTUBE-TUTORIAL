    ||------------------------------------------------------

    ||-- Some Notes regarding this --||

    getElementsByClassName ==returns==> HTML collection
    querySelectorAll ==returns==> Node List

    Node list , HTML collection (doesn’t have map or filter)  !=  array

    But very much similar to array…

    When we use document.querySelectorAll….

    We get a Node List….

    We can’t just do DOM Manipulation using the list….

    We have to be specific…

    Have to use list[0] / list[1] …etc…

    ||------------------------------------------------
    ||-----can use for-each loop for Node List but not for HTML collection-----||

    ListOfli.forEach((li)=>{
        li.style.color = 'red';   || works well...
     })


    ||----If we want Array Properties...we need to convert HTML collection and Node List into array----||

         or
